        }

        @keyframes fadeIn {

                transform: translateY(20px);
            }

            to {

                transform: translateY(0);
            }
        }

        .page-header h1 {
            font-size: 3rem;

        .page-header p {

            padding-left: 1rem;
            position: relative;
            font-weight: 600;
        }

        .class-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 70%;
            background: #a0826d;
            border-radius: 2px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .work-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(139, 111, 71, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;

            /* 新增：針對 iOS 的硬體加速與防止閃爍 */
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .work-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(139, 111, 71, 0.2);
        }

        .work-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            background: linear-gradient(135deg, rgba(160, 130, 109, 0.2), rgba(139, 111, 71, 0.2));

        .work-image-placeholder {
            width: 100%;

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 8px 8px 0 0;
            flex-shrink: 0;
            cursor: zoom-in;
            transition: transform 0.3s ease;
            transform-origin: center center;
        }

        .lightbox-image.zoomed {
            cursor: zoom-out;
            max-height: none;
            max-width: none;
            width: auto;
            height: auto;
        }

        .lightbox-image-container {
            overflow: auto;
            max-height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px 8px 0 0;

        .lightbox-info {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 0 0 8px 8px;
            max-width: 100%;
            max-height: 200px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .lightbox-close {
            position: absolute;
            top: -3rem;
            right: 0;
            width: 40px;
            height: 40px;
            background: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            color: #6b5d4f;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .lightbox-close:hover {
            background: #a0826d;
            color: white;
            transform: rotate(90deg);
        }

        /* 導航按鈕 */
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            color: #6b5d4f;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .lightbox-nav:hover {
            background: #a0826d;
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        .lightbox-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .lightbox-nav:disabled:hover {
            background: white;
            color: #6b5d4f;
            transform: translateY(-50%);
        }

        .lightbox-prev {

        }

        .lightbox-next {

            left: 50%;

        // 圖片預載入快取
        const imageCache = new Map();

        // 優化的圖片預載入函數
        function preloadImage(src, forceDecode = false) {
            return new Promise((resolve, reject) => {
                if (imageCache.has(src)) {
                    resolve(imageCache.get(src));
                    return;
                }

                const img = new Image();

                img.onload = () => {
                    // iOS 優化：只有在大圖模式(Lightbox)才強制解碼
                    // 列表模式下讓瀏覽器自己處理，避免卡頓
                    if (forceDecode && 'decode' in img) {
                        img.decode()
                            .then(() => {
                                imageCache.set(src, img);
                                resolve(img);
                            })
                            .catch(() => {
                                // 解碼失敗仍視為載入成功
                                imageCache.set(src, img);
                                resolve(img);
                            });
                    } else {
                        imageCache.set(src, img);
                        resolve(img);
                    }
                };

                img.onerror = reject;
                img.src = src;
            });
        }

        // 批次預載入圖片（限制並發數量）
        async function preloadImagesInBatches(images, batchSize = 3) {
            const results = [];
            for (let i = 0; i < images.length; i += batchSize) {
                const batch = images.slice(i, i + batchSize);
                const batchResults = await Promise.allSettled(
                    batch.map(img => preloadImage(img))
                );
                results.push(...batchResults);
            }
            return results;
        }

        // 修改 setupLazyLoading
        // 簡化觀察器邏輯
        function setupLazyLoading() {
            const observerOptions = {
                root: null,
                rootMargin: '100px', // 增加預載距離，讓使用者滑動時感覺更順
                threshold: 0.1
            };

            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        const src = img.dataset.src;

                        if (src) {
                            // 直接設定 src，不經過 Promise 鏈
                            img.src = src;
                            img.onload = () => {
                                img.style.opacity = '1';
                                img.classList.add('loaded');
                            };
                            // 移除 data-src 避免重複處理
                            img.removeAttribute('data-src');
                        }
                        observer.unobserve(img);
                    }
                });
            }, observerOptions);

            return imageObserver;
        }

        // 渲染畫廊（優化版）
        function renderGallery(classId, works) {
            const gallery = document.getElementById(classId + 'Gallery');

            if (!works || works.length === 0) {
                gallery.innerHTML = '<p style="text-align: center; color: #666;">暫無作品</p>';
                return;
            }

            // 使用 DocumentFragment 提升性能
            const fragment = document.createDocumentFragment();

            works.forEach((work, index) => {
                const card = document.createElement('div');
                card.className = 'work-card';
                // 加入 iOS 硬體加速樣式
                card.style.transform = "translateZ(0)";
                card.onclick = () => openLightbox(classId, index);

                // 圖片處理邏輯優化
                let imageHtml = '';
                if (work.image) {
                    // 使用 data-src 但不依賴複雜的 JS 預載
                    // 加上 decoding="async" 讓瀏覽器非同步解碼
                    imageHtml = `
                <img class="work-image lazy-img" 
                     data-src="${work.image}" 
                     alt="${work.title}"
                     decoding="async" 
                     style="opacity: 0; transition: opacity 0.5s ease-in;">
            `;
                } else {
                    imageHtml = '<div class="work-image-placeholder">🖼️</div>';
                }

                card.innerHTML = `
            ${imageHtml}
            <div class="work-info">
                <h3 class="work-title">${work.title}</h3>
                <p class="work-author">👤 ${work.author}</p>
            </div>
        `;

                fragment.appendChild(card);
            });

            gallery.appendChild(fragment);

            // 重新啟動觀察器
            const images = gallery.querySelectorAll('.lazy-img');
            const observer = setupLazyLoading();
            images.forEach(img => observer.observe(img));
        }

                lightboxImage.classList.remove('zoomed');
                lightboxImage.style.transform = 'scale(1)';
                imageContainer.style.overflow = 'hidden';
            }
        }

        function resetZoom() {
            isZoomed = false;
            lightboxImage.classList.remove('zoomed');
            lightboxImage.style.transform = 'scale(1)';
            imageContainer.style.overflow = 'hidden';
        }

        // 觸控手勢支援
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartDistance = 0;

        lightbox.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                // 雙指縮放
                touchStartDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            } else if (e.touches.length === 1) {
                // 單指滑動
                touchStartX = e.touches[0].clientX;
            }
        }, { passive: true });

        lightbox.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && touchStartDistance > 0) {
                // 雙指縮放
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const scaleChange = currentDistance / touchStartDistance;

                if (scaleChange > 1.2 && !isZoomed) {
                    toggleZoom();
                } else if (scaleChange < 0.8 && isZoomed) {
                    toggleZoom();
                }
            }
        }, { passive: true });

        lightbox.addEventListener('touchend', (e) => {
            if (e.changedTouches.length === 1) {
                touchEndX = e.changedTouches[0].clientX;
                handleSwipe();
            }
            touchStartDistance = 0;
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold && !isZoomed) {
                if (diff > 0) {
                    showNext();
                } else {
                    showPrevious();
                }
            }
        }

        function openLightbox(classId, index) {
            currentClass = classId;
            currentIndex = index;
            resetZoom();
            showWork();
            lightbox.classList.add('active');

            // 預載入相鄰圖片
            preloadAdjacentImages();
        }

        function showWork() {
            const works = worksData[currentClass];
            const work = works[currentIndex];

            resetZoom();

            if (work.image) {
                lightboxImage.style.opacity = '0';
                // Lightbox 需要高品質體驗，所以這裡開啟強制解碼
                preloadImage(work.image, true).then((img) => {
                    lightboxImage.src = work.image;
                    lightboxImage.style.opacity = '1';
                }).catch(() => {
                    lightboxImage.src = '';
                });
            } else {
                lightboxImage.src = '';
            }

            document.getElementById('lightboxTitle').textContent = work.title;
            document.getElementById('lightboxAuthor').textContent = '作者: ' + work.author;
            document.getElementById('lightboxDescription').textContent = work.description || '';
            document.getElementById('lightboxCounter').textContent = `${currentIndex + 1} / ${works.length}`;

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === works.length - 1;
        }

        // 預載入相鄰圖片
        function preloadAdjacentImages() {
            const works = worksData[currentClass];
            const imagesToPreload = [];

            // 預載入前一張
            if (currentIndex > 0 && works[currentIndex - 1].image) {
                imagesToPreload.push(works[currentIndex - 1].image);
            }

            // 預載入下一張
            if (currentIndex < works.length - 1 && works[currentIndex + 1].image) {
                imagesToPreload.push(works[currentIndex + 1].image);
            }

            // 批次預載入
            if (imagesToPreload.length > 0) {
                preloadImagesInBatches(imagesToPreload, 2);
            }
        }

        function showPrevious() {
            if (currentIndex > 0) {
                currentIndex--;
                showWork();
                preloadAdjacentImages();
            }
        }

        function showNext() {
            const works = worksData[currentClass];
            if (currentIndex < works.length - 1) {
                currentIndex++;
                showWork();
                preloadAdjacentImages();
            }
        }

        // 事件監聽
        closeLightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            showPrevious();
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            showNext();
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });

        // 鍵盤導航
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') {
                lightbox.classList.remove('active');
            } else if (e.key === 'ArrowLeft') {
                showPrevious();
            } else if (e.key === 'ArrowRight') {
                showNext();
            }
        });
    </script>
</body>

</html>
