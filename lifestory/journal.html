    <main>
        <div class="container">
            <div class="page-header">
                <h1>📖 工作日誌</h1>
                <p>記錄每週課程精彩瞬間與學習歷程</p>
            </div>

            <div class="control-panel">
                <div class="control-section">
                    <label class="control-label">選擇班級</label>
                    <div class="class-selector">
                        <select class="class-select" id="classSelect">
                            <option value="class1">多樂一甲</option>
                            <option value="class2">流音一乙</option>
                            <option value="class3">電子一乙</option>
                        </select>
                    </div>
                </div>

                <div class="control-section">
                    <label class="control-label">選擇週次</label>
                    <div class="week-nav">
                        <button id="prevWeek">←</button>
                        <div class="week-selector-wrapper">
                            <select id="weekSelect" class="week-select">
                            </select>
                        </div>
                        <button id="nextWeek">→</button>
                    </div>
                </div>

                <div class="control-section">
                    <label class="control-label">文字大小</label>
                    <div class="font-size-control">
                        <button id="decreaseFont" title="縮小文字">A-</button>
                        <span id="fontSizeDisplay">100%</span>
                        <button id="increaseFont" title="放大文字">A+</button>
                        <button id="resetFont" title="重設大小">重設</button>
                    </div>
                </div>
            </div>

            <div class="journal-content" id="journalContent">
            </div>
        </div>

    <footer>
        <p>© 2025 生命書寫成果展 | 中文閱讀與表達課程 | 南台科技大學</p>
        <p>指導老師:駱育萱</p>
    </footer>
    <script src="daily/journal.js"></script>

    <script>
        // State
        let currentClass = 'class1';
        let currentWeek = 2;
        const maxWeek = 18; // Update as more weeks are added
        let fontSize = 100; // Font size percentage

        // DOM Elements
        const classSelect = document.getElementById('classSelect');
        const prevWeekBtn = document.getElementById('prevWeek');
        const nextWeekBtn = document.getElementById('nextWeek');
        const weekSelect = document.getElementById('weekSelect'); // 新增：獲取下拉選單
        const journalContent = document.getElementById('journalContent');
        const increaseFontBtn = document.getElementById('increaseFont');
        const decreaseFontBtn = document.getElementById('decreaseFont');
        const resetFontBtn = document.getElementById('resetFont');
        const fontSizeDisplay = document.getElementById('fontSizeDisplay');

        // Initialization: 產生週次選項
        function initWeekOptions() {
            weekSelect.innerHTML = '';
            for (let i = 1; i <= maxWeek; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `第 ${i} 週`;
                if (i === currentWeek) option.selected = true;
                weekSelect.appendChild(option);
            }
        }

        // Event Listeners
        classSelect.addEventListener('change', (e) => {
            currentClass = e.target.value;
            renderJournal();
        });

        // 新增：下拉選單變更事件
        weekSelect.addEventListener('change', (e) => {
            currentWeek = parseInt(e.target.value);
            updateButtonState(); // 更新按鈕狀態
            renderJournal();
        });

        prevWeekBtn.addEventListener('click', () => {
            if (currentWeek > 1) {
                currentWeek--;
                updateWeekUI(); // 同步更新下拉選單和按鈕
                renderJournal();
            }
        });

        nextWeekBtn.addEventListener('click', () => {
            if (currentWeek < maxWeek) {
                currentWeek++;
                updateWeekUI(); // 同步更新下拉選單和按鈕
                renderJournal();
            }
        });

        // Font size controls
        increaseFontBtn.addEventListener('click', () => {
            if (fontSize < 150) {
                fontSize += 10;
                updateFontSize();
            }
        });

        decreaseFontBtn.addEventListener('click', () => {
            if (fontSize > 70) {
                fontSize -= 10;
                updateFontSize();
            }
        });

        resetFontBtn.addEventListener('click', () => {
            fontSize = 100;
            updateFontSize();
        });

        // Functions

        // 新增：統一更新週次介面 (同步下拉選單與按鈕)
        function updateWeekUI() {
            weekSelect.value = currentWeek; // 讓下拉選單顯示當前週次
            updateButtonState();
        }

        // 新增：只更新按鈕的禁用狀態
        function updateButtonState() {
            prevWeekBtn.disabled = currentWeek === 1;
            nextWeekBtn.disabled = currentWeek === maxWeek;
        }

        function updateFontSize() {
            journalContent.style.fontSize = fontSize + '%';
            fontSizeDisplay.textContent = fontSize + '%';
            decreaseFontBtn.disabled = fontSize <= 70;
            increaseFontBtn.disabled = fontSize >= 150;
        }

        function renderJournal() {
            // 安全性檢查：確保 journalData 存在
            if (typeof journalData === 'undefined' || !journalData[currentClass] || !journalData[currentClass][currentWeek]) {
                journalContent.innerHTML = `
                    <div style="text-align: center; color: #7a6a5a; padding: 3rem; background: #fff; border-radius: 12px; border: 2px dashed #e0d5ce;">
                        <h3>本週課程記錄尚未更新</h3>
                        <p>請選擇其他週次或稍後再訪</p>
                    </div>`;
                return;
            }

            const data = journalData[currentClass][currentWeek];

            let html = '';
            if (data.title) {
                html += `
                    <div class="journal-header-section">
                        <h1 class="weekly-main-title">${data.title}</h1>
                    </div>
                `;
            }
            // Photos Section
            if (data.photos && data.photos.length > 0) {
                html += `
                    <div class="journal-section">
                        <h2 class="section-title">一、課程照片</h2>
                        <div class="photo-gallery">
                `;

                data.photos.forEach((photo, index) => {
                    html += `
                        <div class="photo-item">
                            <img src="${photo.src}" alt="課程照片 ${index + 1}" class="photo-image" 
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="photo-placeholder" style="display: none;">📸</div>
                            <div class="photo-caption">${index + 1}. ${photo.caption}</div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            // Record Section
            if (data.record) {
                html += `
                    <div class="journal-section">
                        <h2 class="section-title">二、課程紀錄</h2>
                        <div class="course-record">
                            ${data.record.summary}
                        </div>
                    </div>
                `;
            }

            if (data.activities && data.activities.length > 0) {
                data.activities.forEach(activity => {
                    html += `
                        <div class="activity">
                            <h3 class="activity-title">${activity.title}</h3>
                            
                            <div class="activity-content">
                                <p>${activity.content}</p>
                            </div>
                            ${activity.observation ? `
                                <div class="observation">
                                    <div class="observation-title">課程觀察:</div>
                                    <p>${activity.observation}</p>
                                </div>
                            ` : ''}

                            ${activity.reflection ? `
                                <div class="reflection">
                                    <div class="reflection-title">課程心得: </div>
                                    <p>${activity.reflection}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
            }

            journalContent.innerHTML = html;
        }
        // Initialize
        initWeekOptions(); // 產生選項
        updateWeekUI();    // 設定初始狀態
        updateFontSize();
        renderJournal();
    </script>

    <style>
        /* 新增週次選單樣式 */
        .week-select {
            padding: 0.5rem 1rem;
            border: 2px solid #d4c5b9;
            border-radius: 6px;
            font-size: 1rem;
            color: #5d4037;
            background-color: #fff;
            cursor: pointer;
            text-align: center;
            min-width: 120px;
        }

        .week-select:focus {
            outline: none;
            border-color: #a18e80;
            box-shadow: 0 0 0 3px rgba(161, 142, 128, 0.2);
        }

        /* 調整按鈕寬度，讓排版更好看 */
        #prevWeek,
        #nextWeek {
            min-width: 40px;
            padding: 0.5rem;
        }

        /* ----------------------- */

        .photo-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .photo-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .font-size-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .font-size-control button {
            padding: 0.5rem 1rem;
            background: #fff;
            border: 2px solid #d4c5b9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: #7a6a5a;
            transition: all 0.3s ease;
        }

        .font-size-control button:hover:not(:disabled) {
            background: #f5ebe0;
            border-color: #c4b5a9;
            transform: translateY(-2px);
        }

        .font-size-control button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #fontSizeDisplay {
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            color: #7a6a5a;
        }

        /* 新增週次標題樣式 */
        .journal-header-section {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e0d5ce;
            /* 底部加一條裝飾線 */
        }

        .weekly-main-title {
            font-size: 1.8rem;
            color: #5d4037;
            font-weight: bold;
            margin: 0;
            line-height: 1.4;
        }

        /* 手機版字體稍微縮小 */
        @media (max-width: 768px) {
            .weekly-main-title {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .font-size-control {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</body>
