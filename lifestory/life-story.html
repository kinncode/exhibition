    <style>
        /* === 頁面切換控制 === */
        .view-section {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .view-section.active {
            display: block;

        /* === VIEW 1: 故事選集列表 === */

        }

        }

            font-size: 1.1rem;

        /* 視圖切換按鈕 */

            margin-bottom: 2rem;
        }

        .toggle-btn {
            background: transparent;

            color: #a0826d;

            border-radius: 30px;
            font-size: 1.1rem;

            color: #fff;
            box-shadow: 0 4px 15px rgba(160, 130, 109, 0.4);
        }

        .tab-content {
            display: none;

        }

        .tab-content.active {
            display: block;

        }

        /* 影片網格樣式 (從影片頁面移植) */

            font-size: 2rem;

            margin-bottom: 3rem;
            position: relative;
        }

        .section-title::after {
            content: '';

            width: 60px;
            height: 3px;
            background: #a0826d;
            margin: 1rem auto 0;
            border-radius: 2px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-bottom: 6rem;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(160, 130, 109, 0.2);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(139, 111, 71, 0.2);
            border-color: rgba(160, 130, 109, 0.5);
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #000;
        }

        .video-thumbnail iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        .video-card:hover .video-thumbnail iframe {
            transform: none;
        }

        .video-thumbnail video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            background: #000;
        }

        .video-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .video-title {

        }

            margin-bottom: 1.5rem;

        .stories-grid {

            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));

        /* 卡片樣式 */

            flex-direction: column;

            border-color: rgba(160, 130, 109, 0.4);

        .card-body {

            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-meta {

        .article-wrapper {

    <script>
        // === 1. 故事資料庫 (增加了一些長度測試分頁) ===
        const storiesData = [
            {
                id: 1,
                title: "地獄遊記",
                author: "林敬凱",
                studentInfo: "自控一甲 4A2071 林敬凱 ",
                date: "",
                category: "",
                excerpt: "那一天的我告別了我小學時稱兄道弟的夥伴,過去我們曾打架鬧事,過去我們曾在校長室上過課,過去還差點上少年法庭,就這樣精采的六年就這樣過去了,再見了我的小學;進入國中,我是林敬凱,我要在這裡三年過著安分守己的生活。...",
                content: `
                    <p>那一天的我告別了我小學時稱兄道弟的夥伴,過去我們曾打架鬧事,過去我們曾在校長室上過課,過去還差點上少年法庭,就這樣精采的六年就這樣過去了,再見了我的小學;進入國中,我是林敬凱,我要在這裡三年過著安分守己的生活。</p>
                    <div class="sub-title">那晚跪神明廳</div>
                    <p>踏進新教室的那天,我左顧右盼想找到自己的知己,當時的教室就像關者 一群飢餓的野狼,心裡不知道為甚麼像是磁鐵一樣受到了干擾也跟著開始飢餓 了,巴不得趕快下課。國中我第一個朋友是坐我後面的同學,他長得很像小叮 噹,可是他有一頭自然捲的頭髮,小時候常聽別人說有自然捲的脾氣都很不好, 所以我對他不會開太大的玩笑,都只是小小的,就那麼一點吧⋯⋯我國中一年級 的班導師是一個女老師,看起來人好好的,應該很好說話,結果我不知道是習 慣了,還是怎麼樣,有天他在訓斥我的行為,我手中剛好有一本書,就直接往 她臉上,輕輕的把書放到她的頭上,她當下勃然大怒,我心想事情大條了,於 是我國中的第一天就這樣精采的結束了。然而我的悲劇也悄悄的來臨,一回家 導師就打電話到家裡和家長溝通,當然竹筍炒肉絲是免不了的,第二天一支警 告寄到家裡,當下還沾沾自喜說達成一項成就了,結果回家,又是悲劇的開端, 這次換罰跪在神明廳一整晚,那一晚我敵不過睡魔的侵蝕,於是就跪著跪著就 睡著了,凌晨的時候我醒過來,一整個爬不起來,可是還是得去學校。</p>
                    <div class="sub-title">勒索並不開心</div>
                    <p>在國一的時候我們班有一個凱子很有錢,他爸是銀行的總經理,而且跟他 交情好,還會送手機,我聽到這消息幫他做牛做馬,就為了賺 300 塊,結果到 給錢那天,他居然沒錢,我當下很生氣感覺就像是被耍,中午的時候我把他拖 到陰暗的角落勒索,隔天他就吐出錢了。老師當然知道這件事,可是他也不知 道該怎麼辦,於是就放給他爛,其實當下拿到錢的我不是很開心,因為我為了 300 塊跟別人勒索,時光飛逝一年過去了,國一的導師因為龐大的壓力而導致 小產,書也沒辦法好好教了,所以我們在國二換了班導師。</p>
                    <div class="sub-title">惡魔菁英班</div>
                    <p>國二的第一天我很乖的坐在位置上,看著新老師在對我們展現他有甚麼武 器可以好好的教訓我們,我想可能是在早休的時候,訓導主任走進了我們班一 把鼻涕一把淚的說:「恭喜你,教到這班吧」,國二的那年是班上許多菁英分 子崛起的一年,當然我身為精英中的精英要以身作則,可惜我不敢在那軍事化 的教育下亂來;國二的導師是教理化的,他的考試只要梅達標準就是被打,曾 經有一次老師打到了一位千金就被學校警告了,真好,千金就是不一樣,只有 她不用被打,這時的班上開始效仿了那位千金裝死,導師打人的次數就真的減 少了。結果對我還是一樣,古人云:「玉不琢,不成器,人不打,不知學」, 我在班上,理化成績算是前面的,雖然是軍事化的教育,但是那是適用在軍人 身上,對於惡魔是不管用的,國二結束,導師也舉旗投降了,所有的老師都在 議論紛紛我們班的「事蹟」,還在推託說不要教這個班級。</p>
                    <div class="sub-title">給我一個眼神,我什麼都願意 </div>
                    <p>國三前的暑假學校做出了決策,是讓一位有年紀的女老師來帶我們班,可能是小時候的教育,要我們不能讓老人家生氣,所以我們異常地在她的課乖乖的,但其他的課就另當別論了。有老師氣到翻學生桌子,或是差點打起來的都有。國三這一個階段算是戀愛旺季,許多人開始有了男女朋友,而我是對我的 24 支警告開始煩惱。偏偏在這時候有一個住海邊的老師想拆散班上的一對情侶, 結果就逼問我他們是情侶的事情,甚至拿記過權力來壓著我,「真是該死,居 然這樣壓我,可是我再被記過就不能畢業了」,我心裡頓時吐出了這番話,最 終我還是講了。那對情侶是班上大條的班對,結果還是被拆散了,那個住海邊 的老師當然不會背這個罪,所以我背了黑鍋。那一天我失去了所有人對我的信 任,沒人想理我了,就連國中交的第一位朋友也沒察覺到,那陣子好痛苦好痛 苦:「為甚麼?沒有人肯聽我說話,為甚麼?沒人肯相信我……拜託拜託相信 我,求求你們了,求求你們了……事情不是你們想的那樣的……」</p>
                    <p>在這些日子裡為了捍衛我最後那一點尊嚴,我跟人打架被打到手術台上眼睛縫了三針,這三針讓我拋棄了我在國中最後的尊嚴。我開始搞笑,開始學人家乞討,那怕是甚麼丟臉的事我都會做,就為了那一個眼神,就為了那一個機會,我都做,我都做……國中結束前,我們班有位同學被高中部的人給欺負了,同學之間聽了當然很不是滋味,就為了那位同學出氣,這件事情鬧得非常大。在那已經沒有尊嚴的我心裡產生想解決這件事的衝動,於是我就和高中部的學長串通好了要阻止,結果還是沒能阻止,眼看事情準備要爆發了,我就收手還把一些無關緊要的人帶走,以免被波及。才能讓校方比較溫和的處理,學校讓在場的人不能參加畢業典禮,但還是能畢業。雖然沒有讓大家看到我,可是讓大家又重新得看到了我。那一場畢業典禮對我來說是根本沒什麼重大的意義,心裡還覺得能不能快點結束,就這樣我的國中畫上了句點了。</p>
                    <div class="sub-title">高中該何去何從</div>
                    <p>暑假應該是個快樂的假期,可是我卻不怎麼快樂,每間高中都不要我,甚 至我去餐廳打工,就為了見我想去的高中的副校長,結果還是不行。那餐廳的 小開看了也不是滋味罵說:「哪有這種副校長的,學生都那麼想進去了,為甚 麼還不敢來。」我聽了也只是笑笑的,心裡也覺得副校長不來也是應該的。 「誰,會想要我呀?」我輕嘆。;8 月 8 號是一個重要的日子,那天是我外公過 世的日子,他在走的前些日子還說到:「敬凱,是個乖孩子,每次看到他,他 都會陪我。」「對不起,外公……我不乖,我讓家裡的人蒙羞了。」那天的我 跪在離家不遠的廟裡拜拜,乞求能夠有高中唸,突然有人叫了我,我轉身是一 個不認識的叔叔叫我,他問我:「你是不是沒高中念?」我當下有些驚訝,可 能是我那眼神透露出來了吧,我點點頭,他說我可以讓你進一間高中,可是你 要好好努力,那間高中就是我心裡想去的高中,我二話不說馬上答應他,就這 樣我有高中唸了。</p>
                    <div class="sub-title">置之死地而後生</div>
                    <p>回想當初國中時期酸甜苦辣,就好像在一個輪迴一樣,看過了同儕以及長輩的生老病死,快樂過,也失去過所有的東西,但在高中這個階段我付出了我最大的努力,我讓大家都看到了我,甚至對我跌破眼鏡,高中的同學很多人羨慕我,「為甚麼你感覺身邊都有很多人圍繞在你身邊,感覺你甚麼事都那麼認真?」我笑笑的回答:「我死過一次,所以我知道要怎麼活。」</p>
                    `

                excerpt: "國小六年級，我是個非常聽姐姐話的人，某天姐姐突然說：「你可以去學吉他，談吉他很帥喔！」就因為姐姐的這句話，我讓媽媽幫我報名了吉他的一對一教學，我就這樣學了一年。...",
                content: `
                    <div class="sub-title">吉他啟蒙</div>
                    <p>國小六年級，我是個非常聽姐姐話的人，某天姐姐突然說：「你可以去學吉他，談吉他很帥喔！」就因為姐姐的這句話，我讓媽媽幫我報名了吉他的一對一教學，我就這樣學了一年。</p>
                    <p>「彈吉他的男人真的很帥。」</p>

                    <div class="sub-title">又愛又恨的網球</div>
                    <p>我爸爸是個非常喜愛網球的人，不僅愛打網球，也愛看網球，10 歲的我，總是被他帶到球場打球，我相信那時候的他，或許只希望自己的兒子能夠陪伴他一起打球，培養興趣，但是天生對這項運動不具有興趣的我，雖然勉強學了幾年，打得也算不錯，但是我的心裡似乎沒有真正喜歡並接受他。於是，在掙扎了幾年後，我在高中二年級時徹底不再碰這項運動。雖然掙脫了束縛，也不會被逼學網球了，但是這項運動一直是我牽掛的，就連打羽球時打得也不流暢，全都是我把打網球的方式拿來打羽球的關係。或許在未來的某天，當我重拾球拍時，我能夠找回以前的回憶與遺憾，再次打出漂亮的好球。</p>
                    <p>「我也算是網球王子吧？」</p>

                    <div class="sub-title">國中的會考</div>
                    <p>對台灣的學生來說，會考一定是一段難忘的經歷。對我來說，這段經歷也算是一段重要的經歷，正是因為這段經歷，我才真正明白：我不適合讀書，讀書不是我的強項。</p>
                    <p>會考倒數 100 天時，我家人幫我報名了許多補習班，我那時候對未來感到迷茫，不知道自己為了甚麼而讀書，更不知道為了什麼拚搏，也許有人說 5A，但是我的想法是：考了這樣子的成績又如何，還不是被逼出來、監督出來的，這樣的成績，有什麼意義？</p>
                    <p>最後我的成績是 3B2A，有幾個+對我來說並不重要，不影響最後的結果，住在新竹的我進入了竹東高中，我爸媽對於這樣的結果也算是意料之內，我當時也漸漸接受了自己的平庸。</p>
                    <p>「我可能天生不是讀書的料吧。」</p>

                    <div class="sub-title">高中的開始</div>
                    <p>初次進入高中時，我為了進入科探班，還前往竹東高中面試，但這樣的決定也非我本意，對我來說，進入不進入，沒有任何意義，就算進入了，我也沒把握讓自己變得好，但我爸媽一直鼓勵我，所以我也只能認命。</p>
                    <p>教師節那天，我們班為了慶祝，我和另一位同學選擇帶著吉他給每個老師唱一首歌，也是如此，在國中沒有用武之地的吉他技能，在此刻宣洩而出，大家都對於我的熟練度震驚，大家都紛紛稱我為「吉他王子」，就連選拔吉他社時，學長姊都對我的能力感到驚艷。</p>
                    <p>吉他救了我也害了我，他救了我是因為它讓我發現我並不平凡，害了我是因為吉他讓我沉迷於社交，而忽略了課業，導致我的第一次月考考了個全班倒數第一，那時我拿到成績單時感到十分震驚，我明白科探班競爭激烈，但是沒想到那麼激烈，也是因為如此，我乾脆全心投入社團，不再管課業。</p>
                    <p>「對於讓我自卑的事物，我連碰都不想碰。」</p>

                    <div class="sub-title">關於我如何在自主學習裡找回學習熱忱</div>
                    <p>我是個從小就對恐龍極度感興趣的人，或許每個男孩都是這樣，但是因為高中時玩古生物手遊的加成，我變得非常愛鑽研恐龍與古代生物，甚至做了一系列簡報介紹牠們，我製作簡報與查找資料的過程，我的感受是：樂趣無窮且每次都能學到關於古生物的新知識。</p>
                    <p>「我愛古生物和地質學。」</p>

                    <div class="sub-title">餐車事件</div>
                    <p>高二末尾，我和我朋友們突發奇想：一起推著餐車去丟回收。我們是一群喜歡搞事情的男孩子，不僅要推著餐車去，還要把餐車當成載具來玩，某個林姓同學提議要直接坐上去，並讓我們將他從斜坡上推下去，我們一開始都覺得不能這樣，因為太過危險，但是林同學的執著感動了我們。於是，一群男生便一面錄影，一面在一旁為林同學做保護措施。因為學校有兩個斜坡，所以一開始林同學玩完第一個斜坡雲霄飛車後，義無反顧地打算體驗第二個。在他下定決心後，我們在一旁一面記錄這個歷史性的時刻，並一面擔心著餐車上的林同學。</p>
                    <p>餐車從第二個斜坡滑下，但因為偏差，所以餐車被撞了一下，開始不停原地轉圈，我們看到這一幕都不禁為捏了把冷汗。我是鎮守坡下的人，一看見林同學跟著餐車天旋地轉地轉下來，我趕忙伸出救援之手，強行拉停了餐車，甚至在我拉餐車時，鞋底還因此磨了一段距離，才勉強煞住。看見餐車被煞停後，周圍圍觀的同學都紛紛感到不可思議，我們也紛紛過來關心林同學，林同學只說了一句：沒事啦，沒那麼容易死。</p>
                    <p>「林同學真是個勇士。」</p>

                    <div class="sub-title">自己的未來掌握在自己手上</div>
                    <p>「自己決定自己是誰。」這是我一直相信的話，我相信別人無法定義我，當我正在準備學測期間，我也明白了一個道理：我掌握著我自己。當時我為了找尋有沒有遊戲設計相關的科系期間可是操碎了心，甚至我媽媽都不同意我的選擇，但我依然執著地想要證明自己是可以的，於是她承諾：如果我能夠面試上南台科技大學，她便同意。結局也是我成功了，我用我自己的能力，讓教授對我價值表示認可，以正取 2 入學。</p>
                    <p>「自己決定自己是誰。」</p>

                    <div class="sub-title">畢業後的打工旅程</div>
                    <p>畢業後，在家裡無所事事的我，被家人逼著去外頭打工，一開始我在飲料店工作，但因為試用期時被老闆覺得能力不行，於是被辭退。不久後，又有一家公司找上我：和點壽司，220 的時薪加上老闆說不用每天上班，我很爽快地答應了，後來我就知道了為什麼時薪會是 220……</p>
                    <p>由於人手的短缺，我們不得不一個人當成兩個人來用，每次在尖峰黃金時段，我們都忙得不可開交，更不用說假日了，單子鋪天蓋地地襲來，把我壓得喘不過氣，直到大學即將開學之前，我才終於脫離了這樣地獄般的地方，但也同時改變了我很多。</p>
                    <p>「錢沒那麼好賺。」</p>

                    <div class="sub-title">地獄救生員訓練班</div>
                    <p>因為家人的推薦，我在暑假也同時參加了救生員訓練專班，這段經歷對我來說也非常重要，尤其是在海泳時，但這要從頭說起。</p>
                    <p>一進入專班時，我們要測試體能，測驗 5 分鐘內，游完四種泳姿，這真的把我折磨得不輕，但是我還不知道：更折磨的還在後頭。</p>
                    <p>開訓後，我們每天有早午晚餐以及宵夜，當然不是字面上的意思：早餐是熱身游泳，一般會在 400-800 公尺不等，而泳姿有分四式與救生四式，四式就是自仰蛙蝶(一般的游泳姿式)，而救生四式為：抬頭捷泳、抬頭蛙泳、側泳與基本仰泳，簡單來說就是眼睛可以在游泳時睜開的泳姿，而我們的早餐，最常被使用的料有：正常自由式、正常蛙式與救生四式，至於救生四式裡面最累的是抬頭捷泳；而午餐就是上正課，教導我們新東西；晚餐是練習新學到的東西；而宵夜與早餐大同小異，也同樣是體能訓練，游泳長度一般落在 400-600 公尺不等。雖然每天訓練都將我操得四肢痠軟、回家倒頭就睡，但是也將我訓練得更加強大、體力更好。</p>
                    <p>直到我們來到了訓練的尾聲，也就是溪訓與海訓，跟溪訓比起來，海訓是最累的，因為我們整整在海裡游了半個小時，加上新月沙灘的風浪特別大，我活生生喝了好幾口海水，被折磨得不成人樣，直到終於到了沙灘，我才痛苦地癱倒在沙灘上懷疑人生。</p>
                    <p>不僅如此，我們還得下海進行救人演練，這也把我折磨得不清，風浪太大導致我根本無法看見要被救援的人。瞎游了好久後，我總算是救到了溺者，還花了好多力氣將她拉回岸邊，並演練 CPR，整套流程完成後，我攤倒在沙灘上，喘著粗氣，這種體驗，打死我都不想體驗第二次。</p>
                    <p>隔天的溪訓比起海訓舒服非常多，唯一的缺點是山上的溪水實在太冰了，把我凍得直打寒顫。我們還體驗了用救生繩索拉人，那真的是一段奇妙的體驗，那種感覺好像在釣魚，但那隻魚會自己抓繩子。</p>
                    <p>等到訓練與考核全都結束，我真的覺得我獲益良多，除了收穫健康強壯的身體，也獲得了許多救生知識，我變得更能冷靜看待事情，也記住了教練的話：「學救生知識不是為了救人，是為了在關鍵時刻不魯莽，不白送性命，越是懂救生的，越是不會下海救人，因為他們知道危險性，知道當一個人慌亂時會六親不認，這不是殘忍，這是理性。你也是一個家庭的寶貝兒子，憑什麼要冒著生命危險拯救一個素未謀面的人。」這段話非常重要，也讓我蛻變成一個更理性、更有智慧的人。</p>
                    <p>「海訓時，我感覺我差點溺死在海裡，不說了，先買杯雙響炮壓壓驚。」</p>
                `

                excerpt: "「生活中的大小事，不過是滄海一粟，終將被時間的長河沖刷：晴朗的一天，下雨的一天，起風的一天。這樣的日子累積起來，就成為了人生」。...",
                content: `
                    <p>「生活中的大小事，不過是滄海一粟，終將被時間的長河沖刷：晴朗的一天，下雨的一天，起風的一天。這樣的日子累積起來，就成為了人生」。</p>

                    <div class="sub-title">高中印象</div>
                    <p>秋雨綿綿、北雁南飛，現在正值秋日之時節，秋風蕭蕭，些許黃葉被潮濕的風從蒼老的樹枝上搔落，頑皮的降落在了我的頭上。此時此刻身處南工的我，看著金黃玉露的校景，竟然覺有些傷感，距離初來乍到的時間飛逝而過，轉瞬間，一年就在不知不覺中悄然滑落。剩下不到兩年的光陰，還尚且剩餘多少真正的「時間」呢？此刻，我回憶起了當初。</p>
                    <p>「你國中畢業以後，想去哪間學校就讀？未來有什麼打算？」，面對來自國中班導師的提問，我陷入了沉思。這是一輩子的大事，對我來說只有一次機會。但是，我心中早已浮現出了答案。</p>
                    <p>「這樣……就大功告成了！…送出！」，在發亮的螢幕上，志願選填的第一欄，赫然寫著十五個大字：國立台南高級工業職業學校--資訊科。</p>
                    <p>「我的選擇，應該不會有問題吧。」，我懷著忐忑、期待又怕受傷害的心情，再三詢問著自己。</p>
                    <p>就這樣，我來到了南工。</p>
                    <p>綠意盎然的植栽；鱗次櫛比的建築物；人聲鼎沸的禮堂；無邊無際的校景。初入校園，各種景象便令我目不暇給，感到新奇。而當中最令我感興趣的，非要數那排排而站的各種科館了，正如其名，每種科系都有對應的科館，而其中的各種專業工具，更是給我一種無法形容的高級感，雖然有些建築物的外表已經有些破舊了，但換句話說，這就是歷史悠久的象徵吧。</p>
                    <p>而另一項讓我感到新奇的東西，就是「大圓」還有「小圓」了，不同於「刻板印象」中方方正正的建築物，它的造型是中間鏤空的圓柱體，而當中的教室為了配合其獨特的「體型」，而變成了弧形的樣子，甚至內附起伏不大的階梯，頗像某些縮小版本的大學教室。而中間的「空置域」部分，則種植了一顆似乎年事已高的樟樹，而略為遺憾的部分，便是中心除了那棵巨樹以外，就只剩下一層薄薄的草地了與覆蓋其上的落葉了，想像此處繁花景簇的樣子，或許會變得美麗許多吧。</p>
                    <p>而我新生訓練，第一次來到南工時，也發生了一件趣事。那天接近中午時正好下起了傾盆大雨，而在這樣的因緣巧合之下，我們也首次見識到了「南工水樂園」的名號。凡是稍微低漥一點的部分，便會被雨水們給躲進去。所以，大雨滂沱，水面滿盈，讓我們望而卻步。而剛剛提到的大圓建築物中心，則早已變成了游泳池。這麼一想，我或許能理解為什麼此處無法「繁花景簇」了。比起花朵，種點水草也許比較實際。</p>
                    <p>而那天的各種趣事，與師長們的熱情。也讓我留下了很深刻的印象，我也漸漸開始熱愛起南工了。</p>
                    <p>回過神，陰雨早已止歇。秋高氣爽，疊翠流金，太陽也小心翼翼地從灰濛的雲朵後探出了頭，掃去陰霾。「珍惜當下吧」，我拿起之前飄落到頭上的葉子，端詳著，並泛起了微笑。</p>

                    <div class="sub-title">班導初會面</div>
                    <p>由於未成年沒有駕照，所以公車便成了我往返於居家與學校間的橋梁。而我的公車的班次比較早，所以我抵達教室時，距離八點的鐘聲還有差不多半個多小時才會敲響。而當時是一年級剛開學，「人生地不熟」，我也不太敢跟身旁的同學搭話，最後，我只好默默的在位置上發呆，等待時間流逝。</p>
                    <p>終於，在度過了「煎熬」的半個小時後，伴隨著響徹學園的鐘聲，我們新的班導師進入了教師，並「振筆疾書」的在黑板上寫下了她的名字。</p>
                    <p>「這就是...接下來三年的導師嗎？」我心想著。但是，事實似乎並不完全是如此。</p>
                    <p>雖然外表與動作完全看不出來，但實際上這位導師已經快到了要退休的年齡了。結果就導致她可能沒辦法帶完我們三年，或許在一升二或者二升三年級時就會更換導師，光榮迎接退休，雖然似乎會繼續在學校傳授國文知識就是了。</p>
                    <p>如果以一詞概括我對班導的感覺，就像是關愛孫子的阿嬤一樣，時而嘮叨，時而讚許。會注意很多生活小細節，並時常責備我們沒做好的地方。但也正因為如此，我可以抬頭挺胸的說，我認為們班是最整潔的一班。至少我在段考時去往別班時，誇張的說，看到的是環境「滿目瘡痍」，甚至還有異味的。雖然在我們班也有可能是「入鮑魚之肆，久而不聞其臭」罷了。</p>
                    <p>當然除了優點，缺點也還是有的。我覺得最大的問題就是「關心過度」，有很多同學對此都感到厭煩，出發點是善意，但到了實行階段就轉換為厭惡。管教相對嚴格，很排斥同學們下課使用手機的行為（雖然錯在我們就是了）。</p>
                    <p>雖然很多時候我都知道「這是為我們好」，但就跟聽不進父母的「金玉良言」一般，聽不下去，左耳進右耳出，甚至避而不聽。</p>
                    <p>導師曾讓我們在早自修考過試，但畢竟對於學校來說，這不能算是早自修，結果引起我們很大的反彈，早到是好事，可是結果變成要來強制考試，是否會本末倒置呢。想讀的人自然會認真讀；不想讀的人依然會選擇放棄。主旨在於提升大家的成績，但如果結果卻是差強人意，效果不彰，這就只是白白浪費了寶貴的時間與試卷。</p>
                    <p>「我知道這是為了我們好......但最後的結果，是這樣嗎」如此催眠自己，希望能將此合理化——</p>
                    <p>但至少，在相對嚴格的教育下，成效也確實是有的。班上的同學相處融洽，就算遇到爭執也能解衣卸甲，重歸於好。也如同前面所說的，正因為導師吹毛求疵的「潔癖」，我們的環境也非常整潔。上課風氣與秩序也很良好，跟老師有問有答，雖然有些時候太多話，但這也是讓我們哄堂大笑的因子，在不過分的情況下，這也是緩解上課嚴肅氣氛的調和劑之一。同時，在導師的管教之下，我們的手機袋「在上課時」是有實質上的功用的，大家會自覺的將手機放置於此，以心無旁騖（自稱）的聽課。</p>
                    <p>雖然導師明天就要退休了，但我依然很感謝她的含辛茹苦與諄諄教誨。身為老師的最後一屆學生，我能抬頭挺胸的「炫耀」我們班的良好。</p>
                    <p>過去，您帶給了我們很多；如今，時光飛梭，已剩下半年多的時間了；在此，我想說一聲：「老師，謝謝您。」；未來，我也將永遠銘記於心。</p>

                    <div class="sub-title">終點：統測</div>
                    <p>今夜，早早地睡了。翻來覆去，思來想去。輾轉反側，無法入眠。現在的我，又是懷著什麼樣的心情，寫下這篇日記的呢？在統測前夕。</p>
                    <p>每天告誡自己，每天提醒自己，每天反思自己。卻沒有一天做到。沒有興趣，所以不願翻開書本；沒有興致，所以寧願不去面對。未來的我，該何去何從？</p>
                    <p>「沒錯，你們學三年就是為了這25題。」雖然這是早已知曉的事實，但真實聽到時......又覺得難過不已。我的所學，我的所思，我的所想——從來都不重要。在將答案抹黑後，用數字決定我的未來。</p>
                    <p>電子學、基本電學、數位邏輯......專業科目反而成了我的難題。雖然嘴上說著努力了也沒用，但我真的有好好努力過嗎？我知道，現在自我檢討只是徒勞，我了解，我想過。我真的對他沒興趣嗎？還是......我也不用問了。我很清楚我在逃避，我不想學。因為我討厭......不如說痛恨這樣的教育制度。我並非沒興趣。只是，一味的紙上談兵，一味的坐而論道。這不是能讓我......真正想去學的。我希望能瞭解、能應用、能融會貫通。它的運作、它的功能、它的歷史。來自「實習」。我在紙筆考試或許連及格都做不到。但在實習考試高分沒有壓力。</p>
                    <p>但是，不會有人在意。</p>
                    <p>在考場上，唯有死記硬背才是真理。我不用知道原因；我只需記住結果。放棄自己的想法；擁抱大眾的結論。</p>
                    <p>我的未來，何時是由我決定的？考完就丟的知識。將未來的路途蜷縮在一張張早已佈滿行跡的紙張上。「選擇」我自己的將來——用四分之一的選項。將自由贈與了我。讓自由束縛著我。</p>
                    <p>一直以來決定我們價值的，從來都不是我自己。「那樣做是對的」、「這樣做才是對的」，因為周遭的人如此說著。「那樣是不行的」、「做這種事不可原諒」因為身旁的人如此說著。</p>
                    <p>「從今以後都隨我們自己喜歡的，善惡也都由自己的想法去決定」即使如此，如果沒有得到某人的同意，還是無法感到安心。</p>
                    <p>猶豫不決的話就會惹人生氣。語帶矛盾的話就會被人怒斥。所以一直以來都放棄去思考。所以一直以來都放棄去反抗。</p>
                    <p>社會是寫實的，理想是諷刺的。仔細一想，好的成績、好的學校。最後的目標結果都是為了更多的金錢。為了一生不必再為錢所困。「不戚戚於貧賤，不汲汲於富貴」。不是不存在這樣的人，而是現在在社會的耳濡目染、潛移默化之下。使這樣的人不復存在。我當然也不例外。「環堵蕭然，不蔽風日，短褐穿結，簞瓢屢空」。在現今的環境怎麼可能會晏如也呢？</p>
                    <p>「幸」這個字包括著「¥」，是為什麼呢。少了「ㄧ」就變成「辛」，是故意的吧。以後該怎麼做才能輕鬆呢？答案是「這種事沒有人知道」嗎？不想承受痛苦什麼的、只想無所事事的過下去。只想仰望藍天也是一種任性嗎？偶爾只想——閉上眼睛感受夏天的氣息，用指尖描繪著雲朵。只想活在回憶中也是一種任性嗎？</p>
                    <p>回望如今——連殘花敗柳都要被貼上價格也覺得厭煩了。我小時候的夢想又是什麼呢？難道是漸漸長大後就會被遺忘的嗎？淚水能使人成長什麼的不過是詭辯罷了。「即使現在這樣也真的沒關係嗎？」、「照這樣過下去也可以嗎？」答案會是「這是只有我才知道的事情」嗎？閉上眼，感受夏天的氣息。俯下身，想一直被涼風吹拂。只想輕鬆的活下去，也算是一種任性嗎？</p>
                    <p>「惟江上之清風，與山間之明月，耳得之而為聲，目遇之而成色。取之無禁，用之不竭。是造物者之無盡藏也」。有時，我也想好好感受。但是......被貼上價值標籤的生活，再也沒有無盡藏也的事物了。</p>
                    <p>閉上眼，再睜開眼，早已被規劃好的一天一時不差的來臨。</p>

                    <div class="sub-title">旅之形</div>
                    <p>清晨，就連太陽都尚未起來梳洗之時。萬籟俱寂，只有偶爾傳來啁啾的鳥鳴聲，訴說著無人知曉的故事。而就在這時，刺耳的鈴聲劃破了寧靜，從我的書桌上流溢下來，鑽進我的夢中打擾我。</p>
                    <p>我不情願的爬起來，揉了揉惺忪的雙眼。窗外一片漆黑，只有不時閃爍的路燈在努力的掙脫黑暗。我關掉惱人的鬧鐘，換上一套整潔的服裝，拿起早已完備的行李————。今天，是畢業旅行的日子————</p>
                    <p>集合，點名，宣導，上車；興奮，雀躍，期待，緊張。————旅途，就此啟程。</p>
                    <p>在遊覽車上，大家都丟棄了平日的嚴謹，用最雀躍的心，迎接接下來三天的旅程。原本以為會枯燥的坐車，等待目的地的到來，直到領隊拿起了話筒......，而我們的「五音不全」卡拉OK，也就此拉開帷幕。但不管有多「不全」，也仍然無法澆熄我們的歡欣。「狂歡」，這樣的形容詞再適合不過了。數小時的車程，卻絲毫不覺得漫長，時間的軌跡，在不知不覺中流逝。</p>
                    <p>沒多久，我們便千里迢迢的抵達了位於台中第一站————麗寶樂園。</p>
                    <p>雖然大家的體力在遊覽車上藉由唱歌抒發了不少，但這點消耗，根本不值一提。大家依舊容光煥發，迫不及待的一個接著一個下車。當天跟著來到此地的，不止有我們學校的學生，還有很多其他學校的人，年齡不一。大家彼此聊著天，時而竊竊私語，時而放聲大笑，將原本寂靜的地方渲染的車水馬龍、人聲鼎沸。當天萬人空巷之景可謂是好不熱鬧。</p>
                    <p>在一邊合照，一邊步行一段距離後，我們總算抵達了檢票口。在那後方，就是「朝思暮想」的樂園了。我們絡繹不絕的一個跟著一個，有序的進入檢票口。當時，我看到站口旁身著紅色外套的工作人員，手中拿著計數器，每進入一個人，便按下一次按鈕，孜孜不倦的記錄著進場人數。令我不禁好奇，究竟，今天她需要按下多少次按鈕呢？</p>
                    <p>很快，我們班便全員通過了檢票口，按照慣例，在與入口的超大型園區立牌一起留下讓相機留下美好的拓印後，我們便就地解散。</p>
                    <p>由於人潮眾多，我身處的這一小組，便打算「伺機而動」，優先尋找沒有大排長龍的遊樂設施。結果，我們的第一個遊玩的設施便出爐了：碰碰車。在歲月的沖刷下，我早已忘卻上一次乘坐碰碰車是何年何月了，只有偶爾穿過過腦海的回憶提醒著我的思緒。而這一次，我又來的了這個設施前————「不必再去思考以前的瑣事，既然就在眼前了，就『放手一搏吧』」。於是，童心未泯的我們，在與其他國小生的爭先恐後中，進入了場地。</p>
                    <p>隨著倒數聲的行進，所有車輛都在轉瞬間便衝了出去，我們一邊故意相撞，一邊放聲大笑。而在意外瞥見領隊也在其中一輛車上時。我們的「通緝」目標便不約而同的匯聚在了一起......。於是，幾乎是一瞬間，我們這組的所有人開著車朝著不知所措的領隊奔去，把他擠得水洩不通，動彈不得。領隊不停的依靠「車技」想要擺脫我們，但在我們「合作無間」的包圍下，他的一切努力都是徒勞的，以失敗告終。最後，在一片歡鬧聲中，遊戲也拉下了閉幕。</p>
                    <p>在依靠「伺機而動」戰術又遊玩了數個設施後，太陽也快爬到了正上空，我們在短暫商討之後，便決定趁著在人潮如潮水般湧來之前，搶先一步到餐廳吃飯。而在汗水淋漓的步行了一段時間後，我們來到了飯館。而不出所料的，裡面沒有幾個人，我們算是搶到了頭香；而不出所料的，價格一如既往地……貴。小小的一份餐點，甚至能不能填飽經過一個上午消耗、快成了黑洞的肚子都是未知數，而這樣的含量，卻要台幣兩百多元。於是，我們快步逃離了這個吸乾錢包的地方。結果，最後我們來到了最親民的地點————7-11。兩個不大不小的三角鮪魚飯糰，填飽了空洞的胃；一罐沁入心脾的飲料，撫慰了疲勞的心靈。而對比下來，我們花的價格甚至還不到那份餐點的二分之一。「購買有風險，理財須小心」，我的腦中不自覺的浮出了這句話。</p>
                    <p>令人頭暈眼花的旋轉馬克杯、頭暈目眩的天女散花、心驚膽跳的雲霄飛車、劫後餘生的小火車......。快樂的時間總是轉瞬即逝，在經歷了各種設施後，集合的時間也正悄悄地來臨，意猶未盡的我們也緩緩地朝著集合地點前行。</p>
                    <p>......而在這第一站的遊樂園，也發生了一個有趣的小插曲。因為當時正值春季，所以樂園內主題為「水」設施基本都沒有向大眾開放，結果我們班有一個同學似乎因此而特別「難過」？於是，我們為了安慰他，只要一看到「水」，就會拍下照片發送到群主上，並順便＠他，問他要不要玩水。而發送的照片，也從從剛開始正常的拍攝關閉的水上設施，慢慢地變成了池塘，最後就連洗手台的水也不放過，通通被我們拓印成了圖片，被無情的發送了給他，順便附帶一句「要玩嗎」。</p>
                    <p>在領隊清點過人數，確認全員到齊後，我們便開始返程前往心心念念的遊覽車了。而在途中經過一座噴水池時，有人冷不防的喊了一句「要玩嗎」，我們瞬間心領神會，連推帶拉的將那個因玩不到水而難過的他拉到了噴水池邊————一起拍下了離開這裡前的最後一張照片。從他無奈的表情就可以知道，有些事情，還是不要說出來為妙。</p>
                    <p>在經歷了一整個將近一整個下午的「精力發散」後，大家都顯得略有疲憊。而今天的主要行程也差不多告一段落了，在登上遊覽車後，還有人想要繼續「高歌一曲」，但就連導遊都說我們的歌聲是毀滅性的，最好消停一下，也就到此為止了。但是仍然有人想要用那他自稱為「天籟」的嗓音獻聲。但只要耳朵還有正常的在工作，就能親自體驗到什麼叫做魔音貫腦。於是，在前往餐廳用餐的路上，上演著一齣由各種雜色音調與天籟混沌交織的交響樂。</p>

                    <div class="sub-title">尾聲</div>
                    <p>「時間無情而公正，它從不為誰而停下腳步，也不曾為誰而加快速度。它默默的，走著、行著。」</p>
                    <p>或許，有些事情將隨著光陰的前行，而被滯留在後面。但只要一聲呼喚，記憶便會將「它」重新帶回我的面前。</p>
                    <p>已經不記得的回憶，究竟是忘卻了，或者只是想不起來呢？</p>
                    <p>一片花瓣，一抹芳香，一絲清甜，一席涼意……</p>
                    <p>……一方文字。</p>
                    <p>當我重新感觸到這接細節時，或許，那捉迷藏般的回憶便會出現：過去、現在、未來。當重新憶起時，摸了摸嘴角，已然不自覺上揚。</p>
                `
            },
            {
                id: 4,
                title: "成年前的歷練",
                author: "匿名",
                studentInfo: "",
                date: "",
                category: "生命故事",
                excerpt: "我是出生在台南的一位微不足道的孩子，在這片土地上生存至少18年了，這是我的家鄉也是我賴以生存及學習的一片地。...",
                content: `
                    <p>我是出生在台南的一位微不足道的孩子，在這片土地上生存至少18年了，這是我的家鄉也是我賴以生存及學習的一片地。</p>

                    <div class="sub-title">小學疼痛的開端</div>
                    <p>在小學時，還記得當時剛進入學校是個小一新生，教室外有一片空地可以給大家玩鬼抓人、捉迷藏、紅綠燈、呼拉圈、盪鞦韆、溜滑梯等設施，而我在外面玩呼拉圈的時候突然被旁邊小孩的呼拉圈飛過來砸到我的眼睛上方，到現在我還是記得的非常深刻，而當下的我感到非常疼痛也被呼拉圈用到流血…那是我第一次在學校裡面受傷，也是第一次受傷的非常嚴重。</p>

                    <div class="sub-title">待人溫順的老師</div>
                    <p>在小一新生時我遇到的班導是一位很好很好的老師，在小一小二時我都會很有禮貌地對師長及主任等說早說好，而我小一老師張老師她人非常的好。</p>
                    <p>當時張老師都會教我們該做什麼且要怎麼好好跟同學相處不吵架，而我當時在班上表現是很好的，也常常獲得「品德楷模」這個獎狀。為甚麼會說張老師很好？因為她對家長及學生都會很貼切及關愛，也從不罵學生或是責怪。我的母親也在當時很常會送禮物給她，後面也與張老師成為朋友。</p>
                    <p>有次我印象是在小學五六年級的時候，因為當時有加張老師的FaceBook張老師看到我生日跑來問我說：「勝賢你生日有想要甚麼遊戲嗎？」當時的我其實被張老師嚇到了我還拿去給我媽媽看，而我遲遲不敢開口跟老師要這種東西，因為當時比較內向所以我也沒有回應張老師，但我當下其實有一個很喜歡的遊戲叫做「Minecraft當個創世神」這款遊戲，我非常喜愛這款遊戲可惜我爸媽當時不買給我只能遊玩「盜版」而非「正版」想當然能遊玩的東西就很有差別了。</p>
                    <p>有天張老師就跑來我們家，因為家裡是開店的所以張老師知道在哪，她就手上拿了一大盒樂高給我，她說她問我媽媽知道我喜歡拼樂高所以在玩具反斗城買了一大和樂高給我，當下我心裡很開心但也有點失望，雖然樂高在當時確實是我喜歡的一個玩具我組了無數的樂高積木，但比起樂高其實我更想要Minecraft。不過我還是很感謝張老師送的禮物，那是我唯一一次從老師的手上拿到禮物的。直至今日我依舊記憶深刻，而且我也都未打開組裝過對我來說它意義非凡。</p>

                    <div class="sub-title">勤奮過頭的趣味競賽</div>
                    <p>當我升到小四還是小五的時候；當時運動會有個趣味競，需要身體往後走過前面的竿子，而當時我跟同學很努力地在練習並且一直把高度降低挑戰最好的成績出來，但我們練習的地點不是一個好地點，為甚麼不是好地點呢？因為我們在教室練習這個趣味競賽。小學的大家都很天真很自然就在教室架架子開始練，而教室很多木頭桌椅邊邊角角其實都很硬很容易受傷，而當時我往前慢慢走過去準備起身時意外就發生了…我的重心沒有控制好導致整個人往前摔，好死不死左邊眼睛正上方眉毛正下直接撞到桌子的桌腳，撞到的當下我人其實有點傻了因為我整個在大爆血，同學看到馬上拿了好幾張衛生紙給我墊著，然後我馬上跟同學去保健室就這樣通知了家長然後去外科診所開刀縫傷口。</p>
                    <p>當時整個過程說快不快說慢不慢，但我感受到前所未有的恐懼，那是我第一次開刀做手術。到現在記憶還是很深刻且也留下了疤痕。</p>

                    <div class="sub-title">委屈的膝蓋與手肘</div>
                    <p>在小學六年裡的時間裡我很常在學校裡面受傷，手肘跟膝蓋受傷的次數至少也超過20次，因為在小學裡面很常會跑來跑去玩鬼抓人之類的遊戲，而學校的地板又剛好很多凸出來的磁磚、磚頭等等凸起物，我就很常因為這些凸起物而跌倒，造成我膝蓋跟手肘在小學裡受傷很多次看了很多次醫生貼了很多次人工皮。</p>

                    <div class="sub-title">國中噩夢的開始</div>
                    <p>在我升到國一時，當時我特別討厭英文這個科系，而進去聽到我未來三年的班導是教英文的，當下我心裡就知道完蛋了。而三年來也果然我沒有猜錯，這個老師是最兇的老師她會丟課本且考試跟作業很嚴格。</p>
                    <p>好幾次的考試只要沒有考到她的標準，就得先罰寫至少20次，有時是單字中文3遍英文20遍，有時是課文罰寫5遍中文1遍，有時是抄寫句子英文20遍等等諸如此類，對我國中來說簡直是一場噩夢。</p>

                    <div class="sub-title">令人訝異的會考成績</div>
                    <p>在國中的三年以來，其實我非常不愛讀書我也沒有很認真地在聽課，甚至很多課程我都是在睡夢中度過的，我也不期望我的會考成績能有什麼好結果。</p>
                    <p>會考當天我抱著一個心平氣和的心態前往考試，當然考前該準備該檢查的物品也還是不能忘記做的，對我來說絲毫沒有任何壓力可言所以我很輕鬆地就度過了會考，當時也是防疫期間所以又繼續放假。會考成績出來那天我其實被自己嚇到了，或許是班導的折磨又或許是我運氣很好，我的英文居然達到了B++的等級而且差一題就是A，至於其他成績也令我訝異，國文B++英文B++數學B+社會B+自然B+的成績，當下我非常震驚我知道我自己其實很認真去寫，但我訝異我居然會這樣沒複習情況下有這樣的成績，這讓我的國中生涯畫線完美句點。</p>

                    <div class="sub-title">用遊戲賺取的第一桶金</div>
                    <p>在國中到高中期間我很愛玩電玩遊戲，到現在也是不例外。而以前我的桌機是我爸媽退換下來的，其實非常的卡頓玩遊戲不順暢。當時也想當個實況主(Streamer)，所以我利用我常玩的遊戲去賺錢，而在這遊戲裡我的技術有兩把刷子我就在裡面幫別人做代打代練帳號的工作，進而賺取金錢去更換我的電腦。</p>
                    <p>在國二下時我成功存到3萬元的新台幣，我跟我媽說我想拿這些錢去買電腦的時候我媽跟我說：「當作給你生日禮物媽多幫你付15000新台幣。」就這樣我開開心心的獲得一台全新的中高階電競電腦，而這台桌機也就陪我到了現在。</p>

                    <div class="sub-title">有賺錢能力引發的問題</div>
                    <p>到高二開始，我媽說我會自己賺錢了就再也沒有給我過一次零用錢，而我零用錢都是用在去上學買早餐以及中午午餐的餐費。當時我靠著幫別人代打代練帳號以及買賣遊戲帳號賺取了不少的金錢，從那時開始我在學校的早餐及午餐都得自己支付直到了現在。中間我其實想過去打工，因為我很會吃東西我自己賺的錢也很難穩定，如果萬一沒有客流我可能就會在學校吃不了飯，但我也這樣撐著從高二到現在大一，而且在這期間我也花自己賺的錢買了AirPods Pro 2、iPhone 14 Pro Max等等很多3C的產品，我也很常去跟朋友出門聚餐玩耍，這些都是也花了我不少的錢；直到現在我其實也很難相信我是這樣度過來的。</p>

                    <div class="sub-title">我的夢想清單</div>
                    <p>在到18歲成年的期間我一直有著幾個夢想，這些夢想也是在小時候就想要的以及後續新增的。這期間我的夢想有這幾項：成為實況主(Streamer)、成為電競選手(Esports Player/Gamer)、擁有一台全新的電競桌機、擁有一台iPhone、擁有一台iPad、擁有一台筆電、打造一間夢想房間、有高品質的設備、未來有分高薪工作；而到現在我也完成了一半以上的夢想，我也相信著我會繼續朝著我的夢想前進把自己想要的一切都獲取到。</p>
                `
            },
            {
                id: 5,
                title: "我的生活經歷",
                author: "匿名",
                studentInfo: "",
                date: "",
                category: "生命故事",
                excerpt: "我的童年，我不知道要說好還是不好。家庭爭吵、單親、搬家、隔代教養……先從幼稒園前、我親生父親和我媽還沒離婚前開始說好了。...",
                content: `
                    <div class="sub-title">幼稒園前</div>
                    <p>我的童年，我不知道要說好還是不好。家庭爭吵、單親、搬家、隔代教養……先從幼稒園前、我親生父親和我媽還沒離婚前開始說好了。</p>
                    <p>我對那時的記憶不多，基本只剩下他們兩人吵架的記憶了。我那時只有三歲，所以現在有很多記憶都已經消失了。但我還記得，我家那時是賣菜的，還有時候父親會帶我去水田中抓蝌蚪，以及爸媽晚上的吵架聲。</p>
                    <p>我記得有一次吵架吵得很兇，我媽都開始往地上摔東西了。那時姊姊就帶我到房間，抱著我安慰我，說著「沒事、沒事」。但我能看到，她其實也在哭，我能看到她眼角的淚水。</p>
                    <p>之後的記憶就沒了。後面我只知道，媽媽跟我說，爸爸要帶姊姊去高雄讀書了。自那之後，我就再也沒見過爸爸、姊姊。</p>

                    <div class="sub-title">幼稒園時</div>
                    <p>我上幼稒園時，我和媽媽也已經搬到了外婆在新北的公寓住。我讀的是一間雙語幼稒園，有外國教師的那種。那間幼稒園有些對話也要用英文，那時在幼稒園，我就有國文、數學、英文、體育這些課程了，甚至有時候還有英語話劇。</p>
                    <p>這個英語話劇我印象很深刻，那時的主題是跟「不挑食」有關。我那時扮演的是一隻不愛吃魚的獅子。我感覺我那時候的英文能力一定比我現在好（笑）。</p>
                    <p>那時候的家庭狀態是：媽媽上夜班，早上才回來；我則是由外婆和阿公照顧。那時我的另一位大姐姐和哥哥都在上大學，所以沒在家。</p>
                    <p>當時主要照顧我的是外婆和外公。我外公是日本人，而且不會中文，所以我都聽不懂他說什麼；我外婆則是國語、台語、日語都會。現在想想，我外婆真的很厲害。</p>
                    <p>那時的生活就是：媽媽晚上上班，早上才回來；我則是被外婆照顧。至於外公呢，好像我上幼稒園沒多久，他就過世了，所以沒什麼印象。我記得當時我甚至有點怕外公，因為我都聽不懂他說什麼。但聽我媽說，外公其實是最疼我的，只是可惜走得太早了。那時的生活，還算是無憂無慮吧。</p>

                    <div class="sub-title">國小三年級的冤案</div>
                    <p>啊～這是我最難忘的時刻，因為有一件事情，讓我真的好冤枉。</p>
                    <p>那時是下課，我和朋友在玩紙飛機。當時的情況是這樣的：我想要撿起紙飛機，所以蹲下來，結果我朋友跑過來，不知道是怎樣就撞到我，跌倒了，而且還挺嚴重的。</p>
                    <p>當時我們是在司令台前玩，地板是水泥磚材質。他跌倒時往前摔，臉在地上刮了一下，所以有一大塊破皮、流血了。之後就是正常的流程，老師來問話、了解事情經過。這其實不是我覺得冤枉的地方，因為老師有問我事發經過，也有問我為什麼會蹲下。</p>
                    <p>真正讓我覺得冤枉的是回家之後。我一回到家，就看到我媽非常生氣。原來是那位摔倒同學的家長，跟我媽說我是故意的，還是說了什麼，讓我媽整個爆氣。我那時也不敢說話。當時我揹著書包，我媽就拉著我書包上的提帶，左拉右扯，一邊問：「好玩嗎？這樣好玩嗎？」我心裡真的覺得很冤枉，但完全不敢開口。</p>
                    <p>我媽鬆手後，就去拿熱熔膠條出來。對，我媽那時的教育方式就是「打罵出孝子」。我被打了幾下，忍不住大哭。外婆聽到聲音，趕快跑出來護著我。那時我哥也剛讀完大學，暫時跟我們住在一起，他也跑出來，趕快把我媽手上的熱熔膠條藏起來。整個狀況就是：我媽氣到想揍我，外婆和哥哥出來勸架，最後這件事情也就不了了之了。但我那時真的好冤枉。我明明什麼都沒做，卻好像什麼錯都是我的一樣。</p>

                    <div class="sub-title">搬到桃園後</div>
                    <p>沒多久之後，我媽又再婚了。這次是她的高中同學，也就是我現在的繼父。因為媽媽再婚，我和媽媽搬到桃園了；外婆則是回去南投，哥哥暫時繼續住在板橋的公寓。</p>
                    <p>該怎麼說呢？搬到桃園後，生活表面上也一樣正常。繼父自己經營了一家五金行，所以家裡還算富裕；我媽也開始在早上幫繼父顧店，繼父則負責出去送貨。一切看起來都很正常。</p>
                    <p>錯了。</p>
                    <p>有時候在晚上，我能聽到我媽喝醉後的吵架聲。通常都是繼父在勸，我媽在吵。……傻眼。就這樣過著日子。</p>
                    <p>我媽的打罵教育，一直到我上國中才開始改變，也不知道為什麼，就是突然改變了。家中的爭吵聲，也幾乎消失了。只是，我跟我媽中間，似乎已經隔著一層很薄、透明的紙——一種說不出來的感覺。</p>
                    <p>到了高中之後，有時我媽會問我：「你是不是討厭我？」我自然是否定的，但我也不打算再對現在的關係做任何改變了。就保持這樣吧。生活穩定就好。</p>
                `
            },
            {
                id: 6,
                title: "總是愛給自己無聊的人生加點buff",
                author: "匿名",
                studentInfo: "",
                date: "",
                category: "生命故事",
                excerpt: "前年10月我高三的某個星期二晚上跟我爸爸說我想要休學，並跟他討論了一整個晚上，也徵求了他的同意，隔天星期三就去學校跟輔導老師聊這件事...",
                content: `
                    <p>前年10月我高三的某個星期二晚上跟我爸爸說我想要休學，並跟他討論了一整個晚上，也徵求了他的同意，隔天星期三就去學校跟輔導老師聊這件事，請輔導老師幫我跟班導講，星期四再去找班導確認這件事，拿資料回家填，星期五早上我爸爸就跟我一起到學校辦休學了。那時候甚至距離第一次模擬考只剩不到一個月，雖然想了很久，但是真正下定決心只用了短短的4天，其實我根本不知道休學之後要幹嘛、不知道我可以做什麼，也不知道我這麼做到底是不是對的、更不知道我之後會不會後悔……</p>

                    <div class="sub-title">閒不下來</div>
                    <p>辦好所有手續，確定離開學校是10月6日，離開學校過後我也從我之前高中時候打工的地方離職了，在休學前，我的作息很不正常，經常晚上睡不著、早上一直睡，出席狀況其實也已經大受影響，本來想說終於休學了，不用上班也不用上課，可以好好休息一下，想多多出去玩，也把作息調正常，所以就沒有想那麼早開始找新工作，想說好好玩一下，等隔年1月再開始找工作，結果我根本閒不下來，休學過後的那個周末自己一個人出去走走晃晃，但根本不知道還能去哪裡玩，真的太無聊了，整理了一下自己在「小雞上工」的履歷，就開始找工作了。</p>

                    <div class="sub-title">找不到工作</div>
                    <p>因為想調整作息，所以原本想找早餐店的工作，這樣就可以逼自己早睡早起，第一場面試就先找了家附近的早餐店，那家早餐店開到下午，那時候他們只缺中午，但是那個班別上下班時間會是一個很尷尬的時間，早上早起也還不用上班，晚上下班的時間不晚也不早的，想再找一份工作或是想出去玩都不順，所以就拒絕掉了這個面試，但是沒想到在那之後我居然就收不到面試邀約了，明明我也不是沒有相關工作經驗，我從16歲就開始打工，好歹也在餐飲業有了一年多的工作經驗，但是不是被已讀不回，就是連讀都沒有讀，正當我開始焦慮開始在想「完蛋了要找不到工作了」的時候，突然收到了壽司郎的面試邀約，馬上我就跟對方約好時間就去面試了，面試也非常的成功，準備好上班要用的東西，隔週就開啟我的壽司郎之旅了。</p>

                    <div class="sub-title">上班第一天就出大包</div>
                    <p>在壽司郎面試成功後還需要接受教育訓練才能正式開始工作，教育訓練的前一晚我整晚沒睡，當天要看兩三個說明的影片，影片時常快2小時，我看到快睡著，超級累的，但是教育訓練其實沒什麼困難的就是看看影片，聽店長講上班的注意事項這樣而已，所以就也是很順利地通過了。接下來就是第一天上班，第一天上班我是開早，9點就要上班，但是戲劇性的是，我，睡過頭了！沒錯，就是那麼誇張，第一天上班就睡過頭，起床當下我就知道我一定來不及了，我躺在床上思考，我在想還是我乾脆直接不要去，反正大家也不認識我，我再重新找一份工作就好了，但是我又很怕會不會跟一開始一樣找不到工作，思考了一下過後，還是決定乖乖去上班，就按照店長說的請假流程，打電話到店鋪說我會遲到，在電話裡他們也沒說什麼，只叫我來的路上注意安全，這讓我放心不少，我也趕快整理整理就出門上班了，到那裏之後，主管突然跑來問我為什麼我遲到，當下我超級緊張，我就小心翼翼地說了我睡過頭，可能他看我好像很緊張，他就也沒有罵我，就是說他瞭解一下而已。</p>

                    <div class="sub-title">習慣這份工作</div>
                    <p>雖然之前也有餐飲業的工作經驗，但是這還是第一次走進內場，因為其實我在上一份工作中並不是那麼順利，總是不被認同，所以剛來壽司郎的時候我很緊張，我不想要跟之前一樣，我覺得那樣子我會上班上的很不開心，我會很想離職，所以我很努力地想要做好，但是那裏真的好忙，剛開始的時候我每天都在爆單，副店長都會一直來幫我，這讓我覺得很挫折，我覺得我很爛，有幾次下班的時候店長都會關心我，問我還好嗎，我就會直接說我覺得我動作太慢了，我覺得我有點跟不上，但是店長都會安慰我說「不會，以新人來說妳已經做得很好了，帶你的人也都說你很棒」聽到店長都這樣講心裡好受一點，雖然我還是會一直懷疑自己，還是覺得會不會店長只是客套，直到後面上班的時候會偷聽到我的同事們在誇獎我，甚至還有人直接來問我說「欸你是從別間店調來的嗎，怎麼感覺你很熟悉了」我才開始不再懷疑自己。</p>

                    <div class="sub-title">融入大家</div>
                    <p>其實我是一個蠻慢熟的人，別人沒有主動找我講話，我基本上就不太會主動找別人講話，所以剛開始在壽司郎的時候，我其實超安靜，大家在聊天的時候，我都在旁邊默默不講話，但是那裡的大家都很熱情，他們也都會主動找我講話，久而久之我就開始會在休息的時候跟大家一起出去吃飯、下班過後一起去吃宵夜，就連我18歲第一次夜唱也是跟他們，在認識了一個很好的人，他是北科碩士電機系的一個男生，為什麼我會說他很好呢？因為我覺得他真的是一個心態很健康的人，像我很容易因為別人的情緒影響到我，在上班的時候會因為主管心情不好亂生氣，自己在那邊內耗，覺得是不是我做的不夠好、會因為我的夥伴們在擺爛不好好做事，自己在那邊想「都領一樣的薪水，為什麼我就要那麼認真，我也要擺爛」，但他不會，他跟我說「別人不開心那是他的事，我上班就是要開開心心的，我管他為什麼心情不好，我自己開心就好」「同事擺爛那是他不負責任，你只要做好自己的事，不要愧對自己就好」還有很多很多的例子，他也絲毫不會吝嗇於稱讚他人，他總是會很大大方方的，發自內心的讚美我，雖然這聽起來不是什麼很厲害的事，但是我覺得稱讚他人其實是一門很大的學問，我也在努力地向他學習，不管是做人處事還是心態上的調適，他真的都是一個很值得讓人學習的對象。</p>

                    <div class="sub-title">一整年的奇幻冒險</div>
                    <p>在高三這種關鍵時刻休學，不管是誰聽了都不會認同，大部分的人都會說「就剩一年了為什麼不再撐一下」「考完統測上大學就自由啦」我承認，做出這個決定確實是有點衝動了，確實我是有點任性了，但是現在的我完全不會後悔！如果讓我回到過去，我一定也還是會這樣做，雖然剛休學的時候我也懷疑過我的選擇，看著我同學在學校一邊準備統測、一邊玩耍，我其實很羨慕，但是如果沒有休學我可能就不會去壽司郎工作，我就不會遇到這些有趣的事，我就不會認識這些來自各個不同年紀、不同圈子的朋友，我覺得在這一年我成長了許多，這一年也遇到了很多的困難，遇到了很多我原本以為我沒辦法解決的事情，但是最後都還是靠我自己解決了。我很喜歡自己給自己找麻煩，自己挖坑給自己跳，如果是以前的我，可能會對此感到焦慮，但是現在我已經不會害怕這些問題了，相反的，我很喜歡這種開盲盒的感覺，我永遠不知道我會把我自己推進哪個坑，我也不知道我會遇到什麼事，反正遇到了就解決，我覺得沒有我解決不了的事情！</p>
                `
            },
            {
                id: 7,
                title: "幸與不幸",
                author: "匿名",
                studentInfo: "",
                date: "",
                category: "生命故事",
                excerpt: "在國小生活是我幻覺還是只是一場噩夢呢？在國小的日子，我是我嗎？還是只是我在作夢呢？就像在一個永遠醒不來的夢...",
                content: `
                    <div class="sub-title">長達六年的噩夢</div>
                    <p>在國小生活是我幻覺還是只是一場噩夢呢？在國小的日子，我是我嗎？還是只是我在作夢呢？就像在一個永遠醒不來的夢。罪惡的班級。冷漠的旁觀者。觀看表面的老師。還有我這個愚蠢之人，每天那些惡言惡語就像我的幻聽一樣彷彿不在學校我也能聽見。</p>

                    <div class="sub-title">是我的問題嗎？</div>
                    <p>剛進入國小的我是個愚蠢、安靜、膽小的人，就像個魁儡，一開始我也有朋友在我的幻覺裡她們很善良，但事實是我是被玩弄的那個玩具，藏我的東西、虛假的遊戲，這持續了兩年，我知道我是個淚失禁的人也許是這樣我的噩夢開始了，我的幻覺也變得更嚴重了，我的視野裡多了好多人但一開始是誰指使的，我不知道，是我太敏感還是只是幻聽他們的言語，好傷人，是我自卑的幻聽在與我說話還是這是我的幻覺，真希望真的是幻覺或是一場夢，是我的無能與軟弱吸引了喜歡看別人痛苦的怪物，但我的幻覺讓我想要去追尋她們與她們當朋友，我不相信她們不是怪物，但她們的言語就像一把把的劍無情的傷害著我，我開始覺得是不是我的問題是我的方式不對還是我不夠好，我像個愚蠢之人追尋著那虛無的友情可我還是相信這是一場美夢，就算我渾身是傷我還是不願相信是他人的問題，一定是我的問題，我的幻聽告訴我一定是我不夠好，是我不合群，是我跟別人不一樣，活在一個大家都很好的幻覺中，但現實是我正在自我毀滅，身心早有問題，並不是我有問題，只是有人看我不順眼、好欺負，但我還困在夢中無法清醒，是我的問題嗎？</p>

                    <div class="sub-title">糖果甜嗎？</div>
                    <p>在這噩夢中也有一點小確信，也有好人真實的好人，這就像有人突然給了你一顆糖果，幸福但短暫，那個人沒有一直在我身邊而是變成了一個旁觀者，或許在這一場噩夢裡也算一個好事還好他沒拿劍傷害我，那些糖果好少，少到我以為是我的另一個幻覺，對我而言這太過於美好又害怕這只是另一個騙局，至少這是我活下來的動力之一，但也不是所有糖果都好吃，儘管是校外教學我也感受不到太多的歡喜，不是所有糖果都是很甜的，有的好淡，有的甚至沒味道，是我的味覺下降嗎？不管多甜的糖都好沒味道，糖不甜了。</p>

                    <div class="sub-title">醒不來了</div>
                    <p>這個噩夢好長，長的我覺得我永遠醒不來了，重點是我真的能醒來嗎？就好像我永眠了，就好像我死了，就算死了也還在做夢，夢好久，我已經不知道我身心是怎麼狀況，太複雜了，就好像植物人突然有一天醒來了發現自己與這世界跟不上了自己的身體也很難動彈，時不時還會想到自己經歷的那些事情，在黑暗中無助地哭喊卻怎麼也無法醒來，一次又一次回想起來還是那麼真實，就好像還困在那無盡的噩夢裡，那些幻覺與幻聽，就好像我從沒醒來過從沒清醒過，我到底有沒有真的是我自己在這個身體裡是靠我自己的意識在行動的，而不是為了活著而執行的程序，又或是我其實根本沒醒來，也許這只是另一個噩夢的開始前的混亂，我其實根本還是那個愚蠢的我，那個小時候的我，我或許根本沒成長，就好像這個夢境在無限輪迴，我醒不來了。</p>

                    <div class="sub-title">那個我死了</div>
                    <p>曾經的我，那個能因為小小的事高興的我死了，被這無盡的夢殺死了，被折磨的不成人樣，感覺不到快樂，又或著我早就不知道快樂是甚麼了，回想起那時天真無邪的我，我不明白為什麼我那時能如此開心，我看著回憶中的我，我笑了，我像個瘋子一樣笑了，我知道是別人殺死了他，但何曾不是我自願活在那虛為的幻覺當中，在無形之中殺死了他，讓我成為了一個只能一直活在夢境裡痛苦的人，或許那個人也會看著我疑惑的說：「為什麼會這樣」，但老實說：「我也不知道」，這一切是誰造成的？已經不重要了，那個我已經死了，我也千瘡百孔了，雖然不知道為什麼，但我不能再死了，我已經犧牲一個我了。</p>

                    <div class="sub-title">永遠病了</div>
                    <p>我已經不會好了，我病了，是一個永遠不會好的病，如今的笑容是演給別人看的，我的笑容不屬於我，我的樂觀不屬於我，我就像個演員，演著別人眼中快樂、樂觀的我，又或著扮演著穩重、冷漠的人，我不會讓人當我真正的朋友，我害怕我的病被人發現，就算發現，我也無法康復，我只是在用我的一生去找尋那根本不存在的解藥。</p>
                `
            },
            {
                id: 8,
                title: "故山草",
                author: "匿名",
                studentInfo: "",
                date: "",
                category: "生命故事",
                excerpt: "50個月是個連視線都模糊不清的年歲，我曾看見藍天和白雲勾著手奔跑於森林之中，雖然只能想起片段，但回憶在腦海永不退色，永遠湛藍。...",
                content: `
                    <div class="sub-title">意識</div>
                    <p>50個月是個連視線都模糊不清的年歲，我曾看見藍天和白雲勾著手奔跑於森林之中，雖然只能想起片段，但回憶在腦海永不退色，永遠湛藍。我把家人的嗓音牢記在心，一聲聲呼喚和祝福的歌謠，讓小女孩再也忘不掉自己的名字，再也忘不掉自己的家。</p>

                    <div class="sub-title">今昔</div>
                    <p>我來自台灣，一個漂亮的、溫柔的、被稱為福爾摩沙的島國，當然它除了美麗以外更是我引以為傲的故鄉，但並不是這篇生命故事的主角或起源，而我要說的是我的第二個家———越南。我的母親來自越南南方的西寧省，一個樸實的、溫暖的、相較之下不是那麼發達的城市，正因為不是那麼發達所以那兒的事物都像沾了一層塵土，為所有人蓋上了厚重的舊年代色彩，讓時間能夠隨著泥沙慢慢的在記憶中沉澱，成為我五歲前最重要的回憶。</p>

                    <div class="sub-title">泉或山谷</div>
                    <p>西寧的森林裡包攬著萬物，你能在其中找到所有答案，包括金燦燦的麥穗、路邊刺鼻的橡膠木、潺潺流水和深不見底的山谷，為什麼說能找到答案？因為每個角落都有屬於自己的故事。我曾經被哥哥牽著跑過一片森林裡的草原，而最後的終點是小溪源頭的泉水，看著他為了溪水努力跑過半個森林，以及水流過腳邊後滿足的笑容感到不解，於是開口問，「為什麼只是看著泉水就那麼開心呢？」，他先是停下了嬉鬧的腳步立足在岩石上，思索片刻後才慢慢地回應我，「你聽過龍神的故事嗎？因為我們都是河流的子女，所以在水裡會特別平靜。還有你聽過山谷底的樹精嗎？他們來自……」年幼的我雖然不理解但還是聽著他分享這些，現在想想或許有點像我們小時候讀的伊索寓言？因為鄉下教育程度落後所以哥哥姐姐們才會從這些神話中尋找知識。</p>

                    <div class="sub-title">卵</div>
                    <p>和在台灣都市中的家不同，鄉村充滿著生命，其中我最喜歡的是小雞，圓滾滾的、毛絨絨的、十分脆弱的小雞，每當家裡的母雞下了蛋我就會自發負責孵蛋這件事。話雖如此但其實大部分時候都還是母雞在孵蛋，而我的工作就只是為他們替換稻草和整理雞舍，還要一天天的看著雞蛋變化，從最開始光照下潔白的外殼慢慢透出血絲和心臟，再到鳥喙琢破牆壁破殼而出，捧在手中的明明不是我的孩子但又像是從我衍生的血肉一樣，有種自己真的在孕育一條生命的感覺。</p>

                    <div class="sub-title">遠方手札</div>
                    <p>是我留在越南的最後一個月，但小孩子其實並不清楚離別的意義，畢竟過去每隔幾個月就能看見親人的臉，那應該就不算分離？但這次不太一樣，外婆捧著外孫女的臉頰仔細端詳，爾後又叫來了外公，在傍晚的田地裡生起了營火、抱著我唱起了歌，說實話那段旋律我幾乎已經忘光了，但我永遠忘不掉他們拉著我跳舞，外婆的溫柔的笑聲像在祈願一樣的祝福我的未來。這段回憶我並沒有什麼印象，只是某年某日在書櫃翻出了當年媽媽的日記，上面寫著自己最愛的父母和女兒的模樣。</p>
                    <p>這和生命故事無關，但上面的五個標題能組成我和母親的名字，也能組成她對「我」這個人的影響，或許我終其一生都在想辦法回到那個充滿泥沙的、樸實的、炎熱的土地。</p>
                `
            },
            {
                id: 9,
                title: "很高興認識你",
                author: "匿名",
                studentInfo: "",
                date: "",
                category: "生命故事",
                excerpt: "我的朋友自殺了。就是在一個再平常不過的夜晚，久違的打開了遊戲，然後在虛擬人物的那一頭，收到了你留給我的消息。...",
                content: `
                    <div class="sub-title">通知</div>
                    <p>我的朋友自殺了。</p>
                    <p>就是在一個再平常不過的夜晚，久違的打開了遊戲，然後在虛擬人物的那一頭，收到了你留給我的消息。我甚至以為是在開玩笑，這次又串通了誰整什麼幺蛾子。不過是再平常的一天，有人剛剛下班，有人剛剛起床，有人追著離站的公車，有人剛買的飲料好難喝，有人永遠停留在夏天。</p>

                    <div class="sub-title">死亡宣告</div>
                    <p>我也不太懂什麼是死亡，他沒有預告，也沒有通知，沒有給我準備的時間，輕易地就跨過生命的界線，只留我在屏障的後面，不留給我其他選擇權。</p>
                    <p>其實對於人生中大部分人的來去，我都沒有太大的感覺，但是有一天，某一刻，我從床上醒來，然後只是躺著，對一個連臉孔都沒記得清的故人，掉眼淚。明明我沒有記得你，甚至開始忘記你，很努力的，因為我得生活下去，為自己。有時候覺得你的離去，像是一部分硬生生從血肉剝離，四散在各地，我也說不出來你偷走了什麼，就只是偶爾，很偶爾的我會為路邊的小動物逝世而哀悼，然後想如果時光能夠回朔。</p>
                    <p>大概我會給你一把掌，問你為什麼丟下我。</p>

                    <div class="sub-title">為甚麼你沒有為了我留下</div>
                    <p>你是瀟灑了，卻害的清明節與我有關了。</p>
                    <p>我們是在遊戲上志同道合而認識的，明明只大我一歲卻與我有著截然不同的個性，說起來能成為朋友周遭的人也很訝異。他是一個像朝霧一樣的人，其實我也不知道要用什麼詞定義他，一個總是帶給周圍人暖陽的開心果，身邊從來不缺朋友，卻願意帶上我這一顆固執的石頭。</p>
                    <p>不過很偶爾的我總能感覺到他身上，還有一股他不曾說過的潮濕。</p>
                    <p>至此之後我們經常一起玩遊戲或抱怨，慢慢的無話不談，明明兩個本不對頻的人，待在一起卻格外輕鬆，此後，他會給我講功課，還有偶爾會被請客的聚餐，更多時候是我在發牢騷，然後他會像應聲蟲一般，在一旁對對對就是，而每當過後我總會感到輕鬆了不少。</p>
                    <p>他會給我講他上課打瞌睡撞頭包的故事，給我講他爸爸打了他一巴掌剛好把水腫消了，給我講他今天看到了超巨大的蝸牛王，給我講冷笑話，然後在我出聲之前他自己先笑了。</p>
                    <p>給我講，他深信在另一個世界，閻王說不定是個漂亮的大姐姐，黑白無常是雙生花嘰哩呱啦，可是我真的太睏了，模模糊糊的那天只當他是玩笑，同平常一樣，我也沒有聽完他最後說的是什麼。</p>

                    <div class="sub-title">遺憾</div>
                    <p>我一直以為大家都習慣隱藏著情感，反正你能讀懂所以我不說出口也沒有什麼。</p>
                    <p>我是不是沒有告訴你硬要拉上我其實我很開心來著，我是不是沒有告訴你你唱歌真的很難聽，我是不是沒有告訴你其實你口袋的薯條是我掉的，我是不是沒有告訴你你是一個很溫柔的人，我是不是沒有告訴過你我也可以，成為你傾訴的對象。</p>
                    <p>今天起床的時候我真的好想你，很想告訴你我現在過得有多好，你肯定想不到世界這麼大，但在這之後居然沒有人像你。</p>
                    <p>我又沒有很想你，只不過是聽見你的愛歌我竟然下意識的回頭，只不過是夕陽很美很美美到我感覺你沒有看實在太遺憾，只不過是嘗試了你推薦的吃法但果然，還是好難吃。</p>
                    <p>我很遺憾我才剛剛開始認識你，很抱歉我沒有讀懂你的陰霾，很抱歉你喜歡的遊戲皮膚我沒有送你，很抱歉因為我的壞脾氣讓你成為照顧者，很抱歉我覺得一切都是那麼理所當然。</p>

                    <div class="sub-title">雨後會有暖陽</div>
                    <p>在你走後，我沒有給你買過花，白玫瑰太昂貴了你知道我買不起，菊花它太沈重了不適合這樣的你，所以如果我放上幾株鬼針草，你就不要嫌棄了。</p>
                    <p>親愛的朋友，你說過或許我是唯一一個會想念你的人。而你也確實駐足在我的生命裡，雖然我還是會想你，甚至有時我知道我還能感受到你，當朝陽照射我的身體時，我就是知道。</p>
                    <p>但這次我要向前了，所以，祝福我吧。而我也在這天思念你，並祝福你。</p>
                    <p>僅致我的摯友。</p>
                `
            }
        ];

        // === 2. 初始化:產生故事列表 ===
        function initGrid() {
            const gridContainer = document.getElementById('stories-grid-container');
            gridContainer.innerHTML = storiesData.map(story => `
                <div class="story-card" onclick="openStory(${story.id})">
                    <div class="card-body">
                        <div class="card-meta">
                            <span class="category-tag">${story.category}</span>
                            <span>${story.date}</span>
                        </div>
                        <h3 class="card-title">${story.title}</h3>
                        <p class="card-excerpt">${story.excerpt}</p>
                        <div class="card-footer">
                            <div class="author-info">
                                <span>✍️ ${story.author}</span>
                            </div>
                            <span class="read-btn">閱讀全文 →</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // === 3. 分頁邏輯變數 ===
        let currentPages = [];  // 存放切分後的頁面內容
        let currentPageIndex = 0; // 當前在第幾頁 (0開始)
        const CHARS_PER_PAGE = 1000; // 設定一頁大概多少字 (這是一個權衡值,可調整)

        // === 4. 自動分頁函式 (核心邏輯) ===
        function paginateContent(htmlContent, imageObj) {
            // 創建一個暫時的 div 來解析 HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;

            // 取得所有的段落、標題、引用等元素
            // 這裡假設內容都是由區塊元素組成的 (p, div, blockquote, etc)
            const elements = Array.from(tempDiv.children);

            const pages = [];
            let currentPageContent = [];
            let currentCharCount = 0;

            // 如果有圖片,把它當作第一頁的一部分,或者獨立顯示
            // 這裡的策略:如果有圖片,強制圖片放在第一頁最上面
            if (imageObj && imageObj.src) {
                const imgHtml = `
                    <figure>
                        <img src="${imageObj.src}" alt="文章配圖">
                        <figcaption>${imageObj.caption || ''}</figcaption>
                    </figure>
                `;
                currentPageContent.push(imgHtml);
                currentCharCount += 150; // 圖片大約佔 150 字的空間感
            }

            elements.forEach(el => {
                const textLength = el.textContent.length;
                const html = el.outerHTML;

                // 如果當前頁面加上這一段會太長,且當前頁面不是空的,就換頁
                // (如果這一段本身就超長 > CHARS_PER_PAGE,它還是會獨佔一頁,不會被切斷)
                if (currentCharCount + textLength > CHARS_PER_PAGE && currentPageContent.length > 0) {
                    pages.push(currentPageContent.join(''));
                    currentPageContent = [];
                    currentCharCount = 0;
                }

                currentPageContent.push(html);
                currentCharCount += textLength;
            });

            // 把剩下的內容放入最後一頁
            if (currentPageContent.length > 0) {
                pages.push(currentPageContent.join(''));
            }

            return pages;
        }

        // === 5. 切換到閱讀模式 ===
        function openStory(id) {
            const story = storiesData.find(s => s.id === id);
            if (!story) return;

            // 設定固定資訊
            document.getElementById('student-info').textContent = story.studentInfo;
            document.getElementById('article-title').textContent = story.title;

            // 準備圖片物件
            const imageObj = story.image ? { src: story.image, caption: story.imageCaption } : null;

            // 執行分頁切割
            currentPages = paginateContent(story.content, imageObj);
            currentPageIndex = 0; // 重置回第一頁

            // 渲染第一頁
            renderPage();

            // 切換畫面
            switchView('reader-view');
            window.scrollTo(0, 0);
        }

        // === 6. 渲染當前頁面 ===
        function renderPage() {
            const contentArea = document.getElementById('article-content-area');
            const controls = document.getElementById('pagination-controls');

            // 填入當前頁面的 HTML
            contentArea.innerHTML = currentPages[currentPageIndex];

            // 更新按鈕狀態
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const indicator = document.getElementById('page-indicator');

            // 如果只有一頁,隱藏控制列
            if (currentPages.length <= 1) {
                controls.style.display = 'none';
            } else {
                controls.style.display = 'flex';

                // 設定指示器文字
                indicator.textContent = `第 ${currentPageIndex + 1} 頁 / 共 ${currentPages.length} 頁`;

                // 控制按鈕啟用/禁用
                btnPrev.disabled = (currentPageIndex === 0);
                btnNext.disabled = (currentPageIndex === currentPages.length - 1);
            }

            // 每次翻頁都滾動到紙張頂部 (模擬翻書視線回到上面)
            // 這裡滾動到 .article-wrapper 的位置,而不是整個網頁頂部,體驗較好
            const wrapper = document.querySelector('.article-wrapper');
            if (wrapper) wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // === 7. 翻頁函式 ===
        function changePage(delta) {
            const newIndex = currentPageIndex + delta;
            if (newIndex >= 0 && newIndex < currentPages.length) {
                currentPageIndex = newIndex;
                // 淡出舊內容 (簡單視覺優化)
                const contentArea = document.getElementById('article-content-area');
                contentArea.style.opacity = 0;

                setTimeout(() => {
                    renderPage();
                    contentArea.style.opacity = 1;
                }, 200);
            }
        }

        function showIndexView() { switchView('main-list-view'); }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.remove('active');
                setTimeout(() => { if (!el.classList.contains('active')) el.style.display = 'none'; }, 500);
            });
            const target = document.getElementById(viewId);
            if (target) {
                target.style.display = 'block';
                setTimeout(() => { target.classList.add('active'); }, 50);
            }
        }

        let _switchingTab = false;
        function switchTab(tabId) {
            if (_switchingTab) return;
            _switchingTab = true;

            // Update toggle buttons
            document.getElementById('btn-story-view').classList.remove('active');
            document.getElementById('btn-video-view').classList.remove('active');

            if (tabId === 'index-tab') {
                document.getElementById('btn-story-view').classList.add('active');
                window.location.hash = 'stories';
            } else if (tabId === 'video-tab') {
                document.getElementById('btn-video-view').classList.add('active');
                window.location.hash = 'videos';
            }

            // 同步切換 tab — 先全部隱藏，再顯示目標
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
                el.style.display = 'none';
                el.style.opacity = '0';
            });
            const target = document.getElementById(tabId);
            if (target) {
                target.style.display = 'block';
                // 用 requestAnimationFrame 確保 display:block 生效後再淡入
                requestAnimationFrame(() => {
                    target.style.opacity = '1';
                    target.classList.add('active');
                });
            }

            _switchingTab = false;
        }

        // === 影片資料庫與渲染 ===
        const videoCollections = [
            {
                categoryName: "佳作精選",
                videos: [
                    { title: "消失的身分證", localSrc: "img/video/消失的身分證_個人.MOV", author: "同學個人作品", desc: "個人生命故事影片" },
                    { title: "生命故事影片", localSrc: "img/video/生命故事影片_小組.mov", author: "小組合作作品", desc: "小組生命故事影片" }
                ]
            },
        ];

        function createVideoCard(video) {
            // 支援本地影片或 YouTube
            if (!video.youtubeId && !video.localSrc) return '';

            let mediaHTML = '';
            if (video.localSrc) {
                mediaHTML = `
                    <video controls preload="metadata" playsinline>
                        <source src="${video.localSrc}" type="video/mp4">
                        您的瀏覽器不支援影片播放。
                    </video>
                `;
            } else {
                mediaHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/${video.youtubeId}?rel=0&modestbranding=1&playsinline=1" 
                        title="${video.title}" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen
                        loading="lazy">
                    </iframe>
                `;
            }

            return `
                <article class="video-card">
                    <div class="video-thumbnail">
                        ${mediaHTML}
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                        <div class="video-meta">作者：${video.author}</div>
                        <p class="video-desc">${video.desc}</p>
                    </div>
                </article>
            `;
        }

        function renderAllClasses() {
            const container = document.getElementById('all-classes-container');
            if (!container) return;
            let fullContentHTML = '';
            videoCollections.forEach(group => {
                // 濾掉沒有 youtubeId 也沒有 localSrc 的影片
                const validVideos = group.videos.filter(v => v.youtubeId || v.localSrc);
                if (validVideos.length === 0) return;

                const sectionTitleHTML = `<h2 class="section-title" style="margin-top: 1rem;">${group.categoryName}</h2>`;
                const cardsHTML = validVideos.map(video => createVideoCard(video)).join('');
                if (cardsHTML.trim() !== '') {
                    fullContentHTML += (sectionTitleHTML + `<div class="video-grid">${cardsHTML}</div>`);
                }
            });
            container.innerHTML = fullContentHTML;
        }

        function initApp() {
            initGrid();
            renderAllClasses();

            // 檢查 URL 的 hash 以決定要顯示哪一個版面
            if (window.location.hash === '#videos') {
                switchTab('video-tab');
            } else {
                switchTab('index-tab');
            }
        }

        // 當 hash 改變時自動切換 (例如從導覽列點擊)
        window.addEventListener('hashchange', () => {
            if (window.location.hash === '#videos') {
                switchView('main-list-view');
                switchTab('video-tab');
            } else if (window.location.hash === '#stories') {
                switchView('main-list-view');
                switchTab('index-tab');
            }
        });

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
